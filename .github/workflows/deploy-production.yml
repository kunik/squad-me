name: Deploy Production

on:
  workflow_dispatch:
    inputs:
      commit_sha:
        description: "Commit SHA already deployed and smoked on Cloud Dev (defaults to current ref)"
        required: false
        type: string

concurrency:
  group: production
  cancel-in-progress: false

jobs:
  deploy:
    name: Backup · migrate · deploy · smoke
    runs-on: ubuntu-latest
    timeout-minutes: 45
    environment: production
    permissions:
      contents: read
    steps:
      - name: Resolve SHA
        id: sha
        run: |
          SHA="${{ inputs.commit_sha }}"
          if [ -z "$SHA" ]; then SHA="${{ github.sha }}"; fi
          echo "value=$SHA" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.sha.outputs.value }}

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install
        run: npm ci

      - name: Parity (strict)
        run: node scripts/parity-check.mjs --strict

      - name: Typecheck + tests
        run: |
          npm run typecheck
          npm test

      - name: Build Production artifact (same commit)
        env:
          CLOUDFLARE_ENV: production
        run: npm run build:production

      - name: Backup production D1
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          mkdir -p backups
          npx wrangler d1 export squad-me-production-db \
            --remote \
            --output "backups/squad-me-production-${{ steps.sha.outputs.value }}.sql"

      - name: Upload backup artifact
        uses: actions/upload-artifact@v4
        with:
          name: d1-backup-${{ steps.sha.outputs.value }}
          path: backups/
          retention-days: 30

      - name: Apply Production D1 migrations
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler d1 migrations apply DB --remote --env production

      - name: Deploy Production
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler deploy --var COMMIT_SHA:${{ steps.sha.outputs.value }}

      - name: Production smoke (health)
        env:
          SMOKE_BASE_URL: https://squadme.app
        run: |
          # Reuse smoke script shape; production health must report environment=production
          node --input-type=module -e "
            const base=process.env.SMOKE_BASE_URL;
            const res=await fetch(base+'/api/health');
            if(!res.ok) throw new Error('health '+res.status);
            const body=await res.json();
            if(!body.ok || body.environment!=='production') {
              throw new Error('unexpected '+JSON.stringify(body));
            }
            console.log('production smoke health ok', body);
          "
