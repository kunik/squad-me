name: Deploy Cloud Dev

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: cloud-dev
  cancel-in-progress: false

jobs:
  deploy:
    name: Migrate · deploy · smoke
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: cloud-dev
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install
        run: npm ci

      - name: Parity (strict)
        run: node scripts/parity-check.mjs --strict

      - name: Typecheck + tests
        run: |
          npm run typecheck
          npm test

      - name: Build Dev artifact
        env:
          CLOUDFLARE_ENV: dev
        run: npm run build:dev

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: squad-me-${{ github.sha }}
          path: dist/
          retention-days: 14

      - name: Apply Dev D1 migrations
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler d1 migrations apply DB --remote --env dev

      - name: Deploy Dev
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler deploy --var COMMIT_SHA:${{ github.sha }}

      - name: Synthetic seed
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npm run seed:dev

      - name: Cloud Dev smoke
        env:
          SMOKE_BASE_URL: https://dev.squadme.app
        run: npm run smoke:dev
